document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

serif;letter-spacing:.2px;color:#0f1720}\n    .p{font-family:'IBM Plex Sans',sans-serif;color:#3a3f47}\n  <\u002Fstyle>\n<\u002Fhelmet>\n\n<x-import component-from-global-scope=\"deck-stage\" from=\"bfc5f2a5-7720-4e85-a348-34232fb41218#/deck-stage.js\" width=\"1920\" height=\"1080\" hint-size=\"100%,100%\">\n\n  <!-- 1. AÇILIŞ -->\n  <section data-label=\"Açılış\" data-speaker-notes=\"CNC atölyelerinde takım talebi artık kağıtla değil, tek dokunuşla. MYD Takımhane — talep, takip ve teslim tek ekranda.\" style=\"background:#0f1720;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:28px\">\n    <div style=\"font:700 40px/1 'Oswald',sans-serif;letter-spacing:6px;color:#fff\">MYD <span style=\"color:#e2701f\">TAKIMHANE<\u002Fspan><\u002Fdiv>\n    <div style=\"width:64px;height:3px;background:#e2701f\"><\u002Fdiv>\n    <div style=\"font:400 26px/1.5 'IBM Plex Sans',sans-serif;color:#aab2bf;text-align:center;max-width:900px\">Talep, Takip ve Teslim — <span style=\"color:#fff\">Tek Ekranda<\u002Fspan><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 2. ÇOK ŞİRKETLİ GİRİŞ -->\n  <section data-label=\"Çok Şirketli\" data-speaker-notes=\"Her şirket kendi koduyla giriş yapar, kendi izole verisini görür. 14 gün ücretsiz deneme, sonra Temel / Plus / Pro paketleriyle devam.\" style=\"background:#fff;display:flex;flex-direction:column;justify-content:center;padding:0 140px;gap:22px\">\n    <div class=\"lbl\">Çok Şirketli Yapı<\u002Fdiv>\n    <div class=\"h\" style=\"font-weight:700;font-size:56px;line-height:1.15;max-width:1100px\">Her şirket kendi koduyla giriş yapar,<br>kendi izole verisini görür.<\u002Fdiv>\n    <div class=\"p\" style=\"font-weight:400;font-size:26px;line-height:1.6;max-width:900px\">14 gün ücretsiz deneme, sonra <b style=\"color:#0f1720\">Temel<\u002Fb> / <b style=\"color:#0f1720\">Plus<\u002Fb> / <b style=\"color:#0f1720\">Pro<\u002Fb> paketleriyle devam.<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 3. ÜRETİM — YENİ TALEP -->\n  <section data-label=\"Üretim - Yeni Talep\" data-speaker-notes=\"Üretim, iş emri numarası ve tezgahı girer, önceliği belirler — Normal, Acil ya da Kritik. Talep 10 saniyede takımhaneye düşer.\" style=\"background:#0f1720;display:grid;grid-template-columns:1fr 1.15fr;align-items:center;gap:0\">\n    <div style=\"padding:0 90px;display:flex;flex-direction:column;gap:20px\">\n      <div class=\"lbl\">Üretim<\u002Fdiv>\n      <div style=\"font:700 46px/1.2 'Oswald',sans-serif;color:#fff\">Yeni Talep<br>10 Saniyede<\u002Fdiv>\n      <div style=\"font:400 24px/1.6 'IBM Plex Sans',sans-serif;color:#aab2bf\">İş emri numarası ve tezgah girilir, öncelik seçilir — Normal, Acil ya da Kritik. Talep aynı anda takımhaneye düşer.<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"padding:60px 90px 60px 0\"><img src=\"0a2d07e1-a6d5-4e8f-bab0-65d97897d210\" style=\"width:100%;border-radius:12px;box-shadow:0 30px 70px rgba(0,0,0,.5)\"><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 4. NC MÜHENDİSLİK -->\n  <section data-label=\"NC Mühendislik\" data-speaker-notes=\"NC mühendisliği çok sayfalı operasyon kartı Excel'ini yükler, operasyon kodları otomatik okunur — operasyon seçiciden seçip talep açar.\" style=\"background:#fff;display:grid;grid-template-columns:1.15fr 1fr;align-items:center;gap:0\">\n    <div style=\"padding:60px 0 60px 90px\"><img src=\"09d58f6d-a861-4667-96d4-7cc1070a095f\" style=\"width:100%;border-radius:12px;box-shadow:0 20px 50px rgba(15,23,32,.15);border:1px solid #e3e6ea\"><\u002Fdiv>\n    <div style=\"padding:0 90px;display:flex;flex-direction:column;gap:20px\">\n      <div class=\"lbl\">NC Mühendislik<\u002Fdiv>\n      <div class=\"h\" style=\"font-weight:700;font-size:46px;line-height:1.2\">Excel'den Otomatik<br>Operasyon Okuma<\u002Fdiv>\n      <div class=\"p\" style=\"font-weight:400;font-size:24px;line-height:1.6\">Çok sayfalı operasyon kartı Excel'i yüklenir, operasyon kodları otomatik okunur — operasyon seçiciden seçilip talep açılır.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 5. TAKIMHANE KANBAN -->\n  <section data-label=\"Takımhane Kanban\" data-speaker-notes=\"Takımhane tüm açık talepleri tek panoda görür — Üretim ve NC talepleri birlikte. 5 aşamalı akışla talep toplama, hazırlama ve ERP stok çıkışı tek dokunuşla ilerler.\" style=\"background:#0f1720;display:flex;flex-direction:column;justify-content:center;padding:56px 90px;gap:18px\">\n    <div class=\"lbl\">Takımhane<\u002Fdiv>\n    <div style=\"font:700 38px/1.15 'Oswald',sans-serif;color:#fff;max-width:1200px\">Tüm Talepler, Tek Panoda<\u002Fdiv>\n    <img src=\"cb2ac08d-83b7-4b0e-a8f4-5e01c3e103cd\" style=\"width:100%;max-height:660px;object-fit:cover;object-position:top;border-radius:12px;box-shadow:0 30px 70px rgba(0,0,0,.5)\">\n    <div style=\"font:400 19px/1.5 'IBM Plex Sans',sans-serif;color:#aab2bf;max-width:1200px\">Üretim ve NC talepleri birlikte; 5 aşamalı akışla talep toplama, hazırlama ve ERP stok çıkışı tek dokunuşla ilerler.<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 6. GERİ SAYIM & ESKALASYON -->\n  <section data-label=\"Eskalasyon\" data-speaker-notes=\"Kartlar süreyi geri sayar. Normal talep 8 saatte Acile, Acil 4 saatte Kritiğe otomatik yükselir — hiçbir talep unutulmaz.\" style=\"background:#fff;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:0 140px;gap:34px;text-align:center\">\n    <div class=\"lbl\">Otomatik Eskalasyon<\u002Fdiv>\n    <div class=\"h\" style=\"font-weight:700;font-size:50px;line-height:1.2\">Hiçbir Talep Unutulmaz<\u002Fdiv>\n    <div style=\"display:flex;gap:28px\">\n      <div style=\"border:2px solid #dfe3e9;border-radius:14px;padding:26px 34px;min-width:220px\">\n        <div style=\"font:700 15px 'IBM Plex Mono',monospace;color:#3a9c6b;margin-bottom:8px\">NORMAL<\u002Fdiv>\n        <div class=\"p\" style=\"font:400 19px/1.5\">8 saatte <b>Acil<\u002Fb>'e yükselir<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"border:2px solid #f3d9b8;border-radius:14px;padding:26px 34px;min-width:220px;background:#fff7ed\">\n        <div style=\"font:700 15px 'IBM Plex Mono',monospace;color:#c2540a;margin-bottom:8px\">ACİL<\u002Fdiv>\n        <div class=\"p\" style=\"font:400 19px/1.5\">4 saatte <b>Kritik<\u002Fb>'e yükselir<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 7. QR İLE TESLİM -->\n  <section data-label=\"QR Teslim\" data-speaker-notes=\"Tezgah başında QR okutulur, teslim ekranı açılır. Operatör takımları tek tek ya da toplu onaylar, hatalıyı işaretler, gerekirse not bırakır.\" style=\"background:#0f1720;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:0 140px;gap:26px;text-align:center\">\n    <div class=\"lbl\">QR İle Teslim<\u002Fdiv>\n    <div style=\"font:700 50px/1.2 'Oswald',sans-serif;color:#fff\">Tezgah Başında,<br>Tek Okutmayla<\u002Fdiv>\n    <div style=\"font:400 24px/1.6 'IBM Plex Sans',sans-serif;color:#aab2bf;max-width:1000px\">Operatör takımları tek tek ya da toplu onaylar, hatalıyı işaretler, gerekirse not bırakır.<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 8. HATALI TESLİM → GERİ DÖNÜŞ -->\n  <section data-label=\"Hatalı Teslim\" data-speaker-notes=\"Hatalı teslim reddedilirse talep otomatik İş Hazırlamaya döner — turuncu kartla ayrışır, takımhane hangi takımın hatalı olduğunu direkt görür.\" style=\"background:#fff;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:0 140px;gap:26px;text-align:center\">\n    <div class=\"lbl\">Hata Yönetimi<\u002Fdiv>\n    <div class=\"h\" style=\"font-weight:700;font-size:48px;line-height:1.2\">Reddedilen Talep<br>Otomatik Geri Döner<\u002Fdiv>\n    <div class=\"p\" style=\"font-weight:400;font-size:23px;line-height:1.6;max-width:950px\">Turuncu kartla ayrışır — takımhane hangi takımın hatalı olduğunu direkt görür.<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 9. ENVANTER -->\n  <section data-label=\"Envanter\" data-speaker-notes=\"Pro pakette envanter yönetimi de var: parça kodu, stok adedi, kritik seviye uyarısı, barkodla hızlı giriş-çıkış — talep teslim edilince stoktan otomatik düşer.\" style=\"background:#fff;display:grid;grid-template-columns:1.15fr 1fr;align-items:center;gap:0\">\n    <div style=\"padding:60px 0 60px 90px\"><img src=\"3b7deab3-ab25-4632-8100-ac2be9fc1a63\" style=\"width:100%;border-radius:12px;box-shadow:0 20px 50px rgba(15,23,32,.15);border:1px solid #e3e6ea\"><\u002Fdiv>\n    <div style=\"padding:0 90px;display:flex;flex-direction:column;gap:20px\">\n      <div class=\"lbl\">Envanter · Pro<\u002Fdiv>\n      <div class=\"h\" style=\"font-weight:700;font-size:46px;line-height:1.2\">Stok Otomatik<br>Düşer<\u002Fdiv>\n      <div class=\"p\" style=\"font-weight:400;font-size:24px;line-height:1.6\">Parça kodu, stok adedi, kritik seviye uyarısı, barkodla hızlı giriş-çıkış — talep teslim edilince stoktan otomatik düşer.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 10. PERFORMANS & KPI -->\n  <section data-label=\"Performans &amp; KPI\" data-speaker-notes=\"Yönetici zamanında teslim oranını, hazırlık sürelerini, tezgah ve NC bazında performansı görür. Tek tıkla PDF, Excel ya da e-posta olarak paylaşır.\" style=\"background:#0f1720;display:flex;flex-direction:column;justify-content:center;padding:56px 90px;gap:18px\">\n    <div class=\"lbl\">Performans &amp; KPI<\u002Fdiv>\n    <div style=\"font:700 38px/1.15 'Oswald',sans-serif;color:#fff;max-width:1200px\">Yönetici İçin Tek Bakışta Rapor<\u002Fdiv>\n    <img src=\"384bb26b-4715-4af0-a783-3dd6e23a5633\" style=\"width:100%;max-height:660px;object-fit:cover;object-position:top;border-radius:12px;box-shadow:0 30px 70px rgba(0,0,0,.5)\">\n    <div style=\"font:400 19px/1.5 'IBM Plex Sans',sans-serif;color:#aab2bf;max-width:1200px\">Zamanında teslim oranı, hazırlık süreleri, tezgah ve NC bazında performans — tek tıkla PDF, Excel ya da e-posta.<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 11. ARŞİV -->\n  <section data-label=\"Arşiv\" data-speaker-notes=\"Tamamlanan talep 24 saat ekranda kalır, sonra otomatik arşive geçer — ekranlar temiz kalır. Silinen talep her cihazdan kalıcı silinir, geri gelmez.\" style=\"background:#fff;display:grid;grid-template-columns:1.15fr 1fr;align-items:center;gap:0\">\n    <div style=\"padding:60px 0 60px 90px\"><img src=\"23c17cb3-55ff-4784-a253-3f8a8419a73f\" style=\"width:100%;border-radius:12px;box-shadow:0 20px 50px rgba(15,23,32,.15);border:1px solid #e3e6ea\"><\u002Fdiv>\n    <div style=\"padding:0 90px;display:flex;flex-direction:column;gap:20px\">\n      <div class=\"lbl\">Arşiv &amp; Otomatik Yedek<\u002Fdiv>\n      <div class=\"h\" style=\"font-weight:700;font-size:44px;line-height:1.2\">Ekranlar<br>Temiz Kalır<\u002Fdiv>\n      <div class=\"p\" style=\"font-weight:400;font-size:24px;line-height:1.6\">Tamamlanan talep 24 saat sonra otomatik arşive geçer. Silinen talep her cihazdan kalıcı silinir, geri gelmez.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 12. KENDİ LOGON, KENDİ DİLİN -->\n  <section data-label=\"Marka &amp; Dil\" data-speaker-notes=\"Her şirket kendi logosunu yükler, kendi yönetici şifresini belirler. Türkçe/İngilizce, açık/koyu tema — tercihin ne olursa olsun kayıtlı kalır.\" style=\"background:#0f1720;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:0 140px;gap:26px;text-align:center\">\n    <div class=\"lbl\">Kendi Logon, Kendi Dilin<\u002Fdiv>\n    <div style=\"font:700 48px/1.2 'Oswald',sans-serif;color:#fff\">Şirketine Göre<br>Şekillenir<\u002Fdiv>\n    <div style=\"font:400 24px/1.6 'IBM Plex Sans',sans-serif;color:#aab2bf;max-width:950px\">Kendi logon, kendi yönetici şifren. Türkçe/İngilizce, açık/koyu tema — tercihin kayıtlı kalır.<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 14. PAKETLER -->\n  <section data-label=\"Paketler\" data-speaker-notes=\"Temel, Plus, Pro — ihtiyacına göre büyüt. Plus ile performans raporları, Pro ile envanter yönetimi ve barkod açılır.\" style=\"background:#0f1720;display:flex;flex-direction:column;justify-content:center;padding:60px 90px;gap:30px\">\n    <div style=\"text-align:center\">\n      <div class=\"lbl\">Paketler<\u002Fdiv>\n      <div style=\"font:700 44px/1.2 'Oswald',sans-serif;color:#fff;margin-top:10px\">İhtiyacına Göre Büyüt<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;gap:24px;justify-content:center\">\n      <div style=\"background:#1a2532;border-radius:14px;padding:30px 34px;flex:1;max-width:320px\">\n        <div style=\"font:700 20px 'Oswald',sans-serif;color:#fff;margin-bottom:10px\">Temel<\u002Fdiv>\n        <div style=\"font:400 17px/1.6 'IBM Plex Sans',sans-serif;color:#aab2bf\">Talep, takip, kanban, QR teslim<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#e2701f;border-radius:14px;padding:30px 34px;flex:1;max-width:320px;transform:scale(1.06)\">\n        <div style=\"font:700 20px 'Oswald',sans-serif;color:#fff;margin-bottom:10px\">Plus<\u002Fdiv>\n        <div style=\"font:400 17px/1.6 'IBM Plex Sans',sans-serif;color:#fff8f0\">+ Performans raporları &amp; KPI<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#1a2532;border-radius:14px;padding:30px 34px;flex:1;max-width:320px\">\n        <div style=\"font:700 20px 'Oswald',sans-serif;color:#fff;margin-bottom:10px\">Pro<\u002Fdiv>\n        <div style=\"font:400 17px/1.6 'IBM Plex Sans',sans-serif;color:#aab2bf\">+ Envanter yönetimi &amp; barkod<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 15. KAPANIŞ -->\n  <section data-label=\"Kapanış\" data-speaker-notes=\"Talep aç. Takip et. Zamanında teslim al. MYD Takımhane.\" style=\"background:#0f1720;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px\">\n    <div style=\"font:700 34px/1 'Oswald',sans-serif;letter-spacing:5px;color:#fff\">MYD <span style=\"color:#e2701f\">TAKIMHANE<\u002Fspan><\u002Fdiv>\n    <div style=\"font:400 30px/1.5 'IBM Plex Sans',sans-serif;color:#fff;text-align:center\">Talep aç. Takip et. <span style=\"color:#e2701f;font-weight:600\">Zamanında teslim al.<\u002Fspan><\u002Fdiv>\n  <\u002Fsection>\n\n<\u002Fx-import>\n\n\n\n<\u002Fx-dc>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
